{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Edit User</h1>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="email">E-Mail</label>
            <input type="text" id="email" value="{{ user.email }}"
                   class="form-control" disabled>
        </div>

        <div class="form-group">
            <label for="password">New Password <span class="text-muted">(leave blank to keep current)</span></label>
            <input type="password" id="password" name="password"
                   class="form-control" minlength="{{ MIN_PASSWORD_LENGTH }}">
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="active" {{ 'checked' if user.active }}>
                Active Account
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
