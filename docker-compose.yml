services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    container_name: lumios-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - lumios_postgres_data:/var/lib/postgresql:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:8-alpine
    container_name: lumios-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: docker.io/minio/minio:latest
    container_name: lumios-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - lumios_minio_data:/data:Z
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jaeger:
    image: docker.io/jaegertracing/jaeger:2.16.0
    container_name: lumios-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    restart: unless-stopped

  landingpage:
    build:
      context: landingpage/.
      args:
        APP_URL: "http://localhost:8081"
    container_name: lumios-landingpage
    ports:
      - "8082:8080"
    restart: unless-stopped

  backend:
    build: backend/.
    container_name: lumios-backend
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./backend/app:/app:Z
      - ./backend/requirements.txt:/requirements.txt:Z
    #healthcheck:
    #  test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
    #  interval: 15s
    #  timeout: 5s
    #  retries: 5
    #  start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: frontend/.
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    env_file: .env
    container_name: lumios-frontend
    environment:
      BACKEND_URL: "http://lumios-backend:8080"
      BACKEND_HOST: "lumios-backend"
    ports:
      - "8081:8080"
    #depends_on:
    #  backend:
    #    condition: service_healthy
    restart: unless-stopped

volumes:
  lumios_postgres_data:
  lumios_minio_data:
