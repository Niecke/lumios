name: Docker — Landingpage

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "landingpage/**"
  pull_request:
    paths:
      - "landingpage/**"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Resolve image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          REPO="europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lumios/landingpage"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=${REPO}:${SHA},${REPO}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "tags=${REPO}:dev-${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REPO}:pr-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: landingpage
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_URL=https://app.lumios.at

      - name: Deploy to Cloud Run
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          SHA=$(git rev-parse --short HEAD)
          gcloud run services update lumios-landingpage \
            --image=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lumios/landingpage:${SHA} \
            --region=europe-west1
