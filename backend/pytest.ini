[pytest]
testpaths = app/tests
# Make the app/ package importable without sys.path manipulation in conftest.py
# (conftest.py also sets it manually so this is belt-and-suspenders)
pythonpath = app

# Short tracebacks for CI; use --tb=long locally when debugging
addopts =
    --tb=short
    --strict-markers
    -q

filterwarnings =
    # Flask-Session filesystem backend deprecation (cosmetic, not actionable)
    ignore::DeprecationWarning:flask_session
    # SQLAlchemy identity map warning caused by session-scoped db + StaticPool
    ignore::sqlalchemy.exc.SAWarning
