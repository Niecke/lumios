{% extends "base.html" %}

{% block head %}
<script src="{{ url_for('static', filename='js/user_create.js') }}" defer></script>
{% endblock %}

{% block content %}
<div class="card">
    <h1>Create New User</h1>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="email">E-Mail *</label>
            <input type="text" id="email" name="email"
                   value="{{ email or '' }}"
                   class="form-control" required maxlength="255">
        </div>

        <div class="form-group">
            <label for="account_type">Account Type *</label>
            <select id="account_type" name="account_type" class="form-control">
                <option value="local">Local (password)</option>
                <option value="google">Google OAuth</option>
            </select>
        </div>

        <div class="form-group" id="password-field">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password"
                   class="form-control" minlength="{{ MIN_PASSWORD_LENGTH }}">
        </div>

        <div class="form-group">
            <label>Roles</label>
            {% for role in all_roles %}
            <label class="checkbox-label">
                <input type="checkbox" name="roles" value="{{ role.id }}">
                {{ role.name }}{% if role.description %} <span class="text-muted">— {{ role.description }}</span>{% endif %}
            </label>
            {% else %}
            <span class="text-muted">No roles defined.</span>
            {% endfor %}
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="active" checked>
                Active Account
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Create User</button>
            <a href="{{ url_for('admin.users_view') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
