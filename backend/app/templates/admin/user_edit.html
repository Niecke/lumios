{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Edit User</h1>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label>E-Mail</label>
            <input type="text" value="{{ user.email }}" class="form-control" disabled>
        </div>

        <div class="form-group">
            <label>Account Type</label>
            <input type="text" value="{{ user.account_type }}" class="form-control" disabled>
        </div>

        {% if user.account_type == 'local' %}
        <div class="form-group">
            <label for="password">New Password <span class="text-muted">(leave blank to keep current)</span></label>
            <input type="password" id="password" name="password"
                   class="form-control" minlength="{{ MIN_PASSWORD_LENGTH }}">
        </div>
        {% endif %}

        <div class="form-group">
            <label>Roles</label>
            {% for role in all_roles %}
            <label class="checkbox-label">
                <input type="checkbox" name="roles" value="{{ role.id }}"
                       {{ 'checked' if role in user.roles }}>
                {{ role.name }}{% if role.description %} <span class="text-muted">— {{ role.description }}</span>{% endif %}
            </label>
            {% else %}
            <span class="text-muted">No roles defined.</span>
            {% endfor %}
        </div>

        <div class="form-group">
            <label for="subscription">Subscription</label>
            <select id="subscription" name="subscription" class="form-control">
                {% for st in subscription_types %}
                <option value="{{ st.value }}" {{ 'selected' if user.subscription == st }}>
                    {{ st.value | capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="active" {{ 'checked' if user.active }}>
                Active Account
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('admin.users_view') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>

    <hr style="margin: 1.5rem 0;">

    <h2 style="font-size: 1rem; margin-bottom: 0.75rem;">AGB / AVV Acceptance</h2>
    <div class="form-group">
        <label>Accepted Version</label>
        <input type="text" value="{{ user.agb_version or '—' }}" class="form-control" disabled>
    </div>
    <div class="form-group">
        <label>Accepted At</label>
        <input type="text" value="{{ user.agb_accepted_at.strftime('%Y-%m-%d %H:%M UTC') if user.agb_accepted_at else '—' }}" class="form-control" disabled>
    </div>
</div>
{% endblock %}
